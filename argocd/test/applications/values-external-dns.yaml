externalDns:
  chartVersion: "1.16.1"
  values:
    provider:
      name: google
    extraArgs:
      - --google-project=<your-test-project-id>
      - --google-zone-visibility=public
    domainFilters:
      - test-public.your-domain.com
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: external-dns@<your-test-project-id>.iam.gserviceaccount.com
    nodeSelector:
      role: tools
    tolerations:
      - key: role
        value: tools
        effect: NoSchedule