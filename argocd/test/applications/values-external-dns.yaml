externalDns:
  chartVersion: "1.16.1"
  values:
    provider:
      name: google
    extraArgs:
      - --google-project=<TEST_PROJECT_ID>
      - --google-zone-visibility=public
    domainFilters:
      - test-public.<DOMAIN>
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: external-dns@<TEST_PROJECT_ID>.iam.gserviceaccount.com
    nodeSelector:
      role: tools
    tolerations:
      - key: role
        value: tools
        effect: NoSchedule