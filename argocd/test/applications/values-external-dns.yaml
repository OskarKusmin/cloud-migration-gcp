externalDns:
  chartVersion: "1.16.1"
  values:
    provider:
      name: google
    extraArgs:
      - --google-project=
      - --google-zone-visibility=public
    domainFilters:
      - test-public.
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: 
    nodeSelector:
      role: tools
    tolerations:
      - key: role
        value: tools
        effect: NoSchedule