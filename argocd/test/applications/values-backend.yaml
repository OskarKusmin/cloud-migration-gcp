backend:
  config:
    CLIENT_URL: "https://frontend.test-public."
    SERVER_PORT: ":8080"
    RUN_MIGRATION: "true"
  externalSecrets:
    enabled: true
    storeName: gcp-secret-manager
    dbCredentialsSecret: voyager-test-db-credentials
    jwtKeySecret: voyager-test-jwt-key
  ingress:
    enabled: true
    host: backend.test-public.
    annotations:
      networking.gke.io/managed-certificates: public-cert