kubePrometheusStack:
  chartVersion: "72.3.0"
  values:
    # --- Prometheus ---
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        nodeSelector:
          role: monitoring
        tolerations:
          - key: role
            value: monitoring
            effect: NoSchedule
        retention: 1d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi

    # --- Alertmanager ---
    alertmanager:
      alertmanagerSpec:
        nodeSelector:
          role: monitoring
        tolerations:
          - key: role
            value: monitoring
            effect: NoSchedule
      config:
        route:
          receiver: "discord"
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - match:
                severity: critical
              receiver: "discord"
        receivers:
          - name: "discord"
            slack_configs:
              - api_url: ""
                send_resolved: true
                title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
                text: '{{ range .Alerts }}*{{ .Labels.severity }}*: {{ .Annotations.description }}{{ "\n" }}{{ end }}'

    # --- Grafana ---
    grafana:
      service:
        type: LoadBalancer
        annotations:
          cloud.google.com/load-balancer-type: "Internal"
      nodeSelector:
        role: monitoring
      tolerations:
        - key: role
          value: monitoring
          effect: NoSchedule
      serviceAccount:
        annotations:
          iam.gke.io/gcp-service-account: grafana@****.iam.gserviceaccount.com
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.loki.svc.cluster.local:3100
          access: proxy
          isDefault: false
        - name: Google Cloud Monitoring
          type: stackdriver
          uid: google-cloud-monitoring
          access: proxy
          jsonData:
            authenticationType: gce
            defaultProject: 
      sidecar:
        datasources:
          uid: prometheus
        dasboards:
          folderAnnotation: grafana_dashboard_folder

    # --- Node selector for operator ---
    prometheusOperator:
      nodeSelector:
        role: monitoring
      tolerations:
        - key: role
          value: monitoring
          effect: NoSchedule
      admissionWebhooks:
        patch:
          nodeSelector:
            role: monitoring
          tolerations:
            - key: role
              value: monitoring
              effect: NoSchedule

    # --- Kube state metrics ---
    kube-state-metrics:
      nodeSelector:
        role: monitoring
      tolerations:
        - key: role
          value: monitoring
          effect: NoSchedule

    # --- Node exporter ---
    prometheus-node-exporter:
      tolerations:
        - key: role
          operator: Exists
          effect: NoSchedule
    
    # --- Disabling monitors for GKE-managed components ---
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    coreDns:
      enabled: false