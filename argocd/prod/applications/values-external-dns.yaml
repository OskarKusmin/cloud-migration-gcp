externalDns:
  chartVersion: "1.16.1"
  values:
    provider:
      name: google
    extraArgs:
      - --google-project=<PROD_PROJECT_ID>
      - --google-zone-visibility=public
    domainFilters:
      - prod-public.<DOMAIN>
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: external-dns@<PROD_PROJECT_ID>.iam.gserviceaccount.com
    nodeSelector:
      role: tools
    tolerations:
      - key: role
        value: tools
        effect: NoSchedule