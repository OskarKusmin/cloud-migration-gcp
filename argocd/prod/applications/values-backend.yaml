backend:
  image:
    repository: <GCP_REGION>-docker.pkg.dev/<SHARED_PROJECT_ID>/voyager/backend
  config:
    CLIENT_URL: "https://www.<DOMAIN>"
    SERVER_PORT: ":8080"
    RUN_MIGRATION: "true"
  externalSecrets:
    enabled: true
    storeName: gcp-secret-manager
    dbCredentialsSecret: voyager-prod-db-credentials
    jwtKeySecret: voyager-prod-jwt-key
  ingress:
    enabled: true
    host: backend.prod-public.<DOMAIN>
    annotations:
      networking.gke.io/managed-certificates: public-cert