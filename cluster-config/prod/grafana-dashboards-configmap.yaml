apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-custom-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_dashboard_folder: "Custom"
data:
  app-logs.json: |
    {
      "annotations": { "list": [] },
      "title": "Application Logs",
      "uid": "app-logs",
      "panels": [
        {
          "title": "Sample App Logs",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"sample-app\"}",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 0 }
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
  postgres-metrics.json: |
    {
      "annotations": { "list": [] },
      "title": "PostgreSQL Metrics",
      "uid": "postgres-metrics",
      "panels": [
        {
          "title": "Active Connections",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "pg_stat_activity_count",
              "legendFormat": "{{datname}} - {{state}}",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }
        },
        {
          "title": "Database Size",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "pg_database_size_bytes",
              "legendFormat": "{{datname}}",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }
        },
        {
          "title": "Transactions",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(pg_stat_database_xact_commit[5m])",
              "legendFormat": "commits - {{datname}}",
              "refId": "A"
            },
            {
              "expr": "rate(pg_stat_database_xact_rollback[5m])",
              "legendFormat": "rollbacks - {{datname}}",
              "refId": "B"
            }
          ],
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 }
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }